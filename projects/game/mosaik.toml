[project]
name = "game"
version = "1.0.0"
target_platforms = [ "gameboy", "gamegear", "lynx", "sms", "pce" ]

[source]
folder = "src/"

[build]
# rom_size/ram_size pick the cartridge geometry on the Game Boy family
# ("32KB" two-bank default; larger sizes link an MBC5 cart -- see
# docs/banking-plan.md). Box Runner fits the default with no cart RAM.
rom_size = "32KB"
output_dir = "build"
