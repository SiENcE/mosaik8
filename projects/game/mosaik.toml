[project]
name = "game"
version = "1.0.0"
target_platforms = [ "gameboy", "gamegear", "lynx", "sms", "pce" ]

[source]
folder = "src/"

[build]
optimization_level = 2
debug_symbols = true
rom_size = "32KB"
ram_size = "8KB"
output_dir = "build"

[dependencies]
stdlib = "1.0"

[platforms.gameboy]
features = [ "save_support",]
memory_layout = "standard"

[platforms.gameboy_color]
features = [ "save_support", "color", "speed_switch",]
memory_layout = "expanded"
