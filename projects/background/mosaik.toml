[project]
name = "background"
version = "1.0.0"
# One graphics.bkg code path for all nine consoles: the GBDK consoles and the
# PC Engine scroll their hardware tilemap (GB scroll registers / VDC BAT +
# BXR/BYR); the Lynx has no tilemap layer, so its bkg engine draws the map as a
# ring of screen-spanning Suzy row-strip sprites (one per visible row).
target_platforms = [ "gameboy", "gameboy_color", "analogue_pocket", "megaduck", "sms", "gamegear", "nes", "lynx", "pce" ]

[source]
folder = "src/"

[build]
output_dir = "build"
